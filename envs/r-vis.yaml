# R Visualization Environment for ATAC-seq Analysis

name: r-vis
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - r-base>=4.2.0
  - r-essentials
  
  # Tidyverse
  - r-tidyverse>=2.0.0
  - r-ggplot2>=3.4.0
  - r-dplyr>=1.1.0
  
  # ChIP-seq/ATAC-seq specific
  - bioconductor-chipseeker>=1.34.0
  - bioconductor-txdb.hsapiens.ucsc.hg38.knowngene>=3.17.0
  - bioconductor-org.hs.eg.db>=3.17.0
  - bioconductor-clusterprofiler>=4.6.0
  - bioconductor-genomation>=1.30.0
  - bioconductor-rtracklayer>=1.58.0
  - bioconductor-enrichedheatmap>=1.28.0
  
  # Visualization packages
  - r-viridis>=0.6.0
  - r-pheatmap>=1.0.12
  - r-rcolorbrewer>=1.1.3
  - r-ggpubr>=0.6.0
  - r-cowplot>=1.1.1
  - r-ggsignif>=0.6.4
  
  # Data manipulation
  - r-reshape2>=1.4.4
  - r-data.table>=1.14.0
  
  # Options
  - r-optparse>=1.7.0
